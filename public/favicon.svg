<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d4d4d8" />
    </linearGradient>
  </defs>
  <!-- Sleek Squircle Background with subtle border -->
  <rect width="100" height="100" rx="26" fill="url(#bgGrad)" stroke="#27272a" stroke-width="3" />
  
  <!-- Bold Modern LY Monogram -->
  <text x="48" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="46" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-2">LY</text>
  
  <!-- Vibrant Accent Dot (Cyan Glow) -->
  <circle cx="76" cy="28" r="6" fill="#00D8FF" />
</svg>